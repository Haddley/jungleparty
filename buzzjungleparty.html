<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jungle Party — phone-buzzer party game</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='42' r='30' fill='%23e53935'/><rect x='30' y='70' width='40' height='10' rx='5' fill='%231e88ff'/><rect x='30' y='84' width='40' height='10' rx='5' fill='%23ff8a1e'/></svg>">
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
:root{
  --jungle-deep:#0b3d1e; --jungle:#14572c; --jungle-lite:#1e7a3e; --leaf:#2e9e52;
  --sand:#f6e3b4; --wood:#7a4a21; --wood-lite:#a2692f;
  --red:#e53935; --red-dark:#a02320;
  --p-blue:#0066ff; --p-orange:#ff7300; --p-green:#00d02e; --p-yellow:#ffe000;
  --ink:#1a2b1e; --paper:#fffdf4;
  --shadow:0 6px 18px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Baloo 2','Nunito',system-ui,sans-serif;color:var(--paper);
  background:linear-gradient(180deg,#0a2f18 0%,#14572c 45%,#1e7a3e 100%);
  overflow:hidden;user-select:none;-webkit-user-select:none;
}
/* ambient jungle canopy */
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.55;
  background:
   radial-gradient(38% 26% at 8% -4%, #0c4520 60%, transparent 61%),
   radial-gradient(42% 30% at 34% -8%, #0e5226 60%, transparent 61%),
   radial-gradient(40% 26% at 64% -5%, #0c4520 60%, transparent 61%),
   radial-gradient(44% 30% at 95% -8%, #0e5226 60%, transparent 61%),
   radial-gradient(30% 18% at 20% 106%, #08351a 60%, transparent 61%),
   radial-gradient(34% 20% at 78% 108%, #0a3d1d 60%, transparent 61%);
}
#fireflies{position:fixed;inset:0;pointer-events:none;z-index:1}
#app{position:relative;z-index:2;height:100%;display:flex;flex-direction:column}
button{font-family:inherit;border:none;cursor:pointer}

/* ---------- shared ---------- */
.screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:22px;text-align:center;min-height:0}
h1.logo{font-size:clamp(34px,7vw,64px);font-weight:800;letter-spacing:1px;line-height:.95;
  color:var(--sand);text-shadow:0 3px 0 var(--jungle-deep),0 8px 22px rgba(0,0,0,.5)}
h1.logo .bang{color:var(--red)}
.sub{font-size:clamp(15px,2.4vw,21px);color:#cfe8cf;max-width:560px}
.card{background:rgba(9,42,21,.82);border:2px solid rgba(246,227,180,.25);border-radius:22px;padding:20px 24px;box-shadow:var(--shadow);backdrop-filter:blur(3px)}
.bigbtn{display:block;width:min(420px,86vw);padding:16px 22px;margin:7px auto;border-radius:16px;font-size:20px;font-weight:800;color:#fff;box-shadow:var(--shadow);transition:transform .08s}
.bigbtn:active{transform:scale(.96)}
.bigbtn.host{background:linear-gradient(180deg,#2e9e52,#1e7a3e)}
.bigbtn.join{background:linear-gradient(180deg,#ff8a1e,#d96f0e)}
.bigbtn.view{background:linear-gradient(180deg,#3b6ecc,#2b53a0)}
input[type=text]{width:min(360px,80vw);padding:13px 16px;border-radius:14px;border:2px solid var(--wood-lite);
  font:inherit;font-size:19px;text-align:center;background:var(--paper);color:var(--ink);outline:none;text-transform:uppercase}
input.name{text-transform:none}
.err{color:#ffb3ac;font-weight:700;min-height:24px}
.small{font-size:14px;opacity:.75}
.pillrow{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.pill{padding:8px 16px;border-radius:999px;font-weight:800;font-size:16px;color:#fff;box-shadow:var(--shadow)}

/* ---------- TV screens ---------- */
.tv-top{display:flex;align-items:center;justify-content:space-between;padding:14px 26px;gap:16px}
.tv-title{font-size:clamp(22px,3.4vw,40px);font-weight:800;color:var(--sand);text-shadow:0 2px 0 var(--jungle-deep)}
.roomtag{font-size:clamp(18px,2.6vw,30px);font-weight:800;background:var(--wood);border:3px solid var(--wood-lite);border-radius:14px;padding:6px 18px;letter-spacing:4px;color:var(--sand)}
.tv-stage{flex:1;position:relative;margin:0 24px 18px;border-radius:24px;overflow:hidden;
  background:
    radial-gradient(circle at 79% 12%, rgba(255,240,170,.5), transparent 24%),
    linear-gradient(180deg,#59bdff 0%,#a9e4ff 34%,#d9f4ff 38.4%,#5ec573 39%,#2e9e52 72%,#15683a 100%);
  border:4px solid var(--wood);box-shadow:inset 0 0 80px rgba(0,0,0,.25),var(--shadow)}
.tv-stage.night{background:
    radial-gradient(circle at 79% 12%, rgba(215,232,255,.22), transparent 20%),
    linear-gradient(180deg,#050f26 0%,#122a50 34%,#1c3c60 38.4%,#173c26 39%,#0f4020 75%,#092c15 100%)}
.announce{position:absolute;left:50%;top:12px;transform:translateX(-50%);max-width:86%;z-index:40;
  background:rgba(9,42,21,.85);border:2px solid var(--sand);color:var(--sand);
  border-radius:999px;padding:8px 22px;font-size:clamp(15px,2vw,22px);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  opacity:0;transition:opacity .25s}
.announce.show{opacity:1}
.hudrow{position:absolute;left:0;right:0;bottom:0;display:flex;justify-content:space-around;padding:10px 16px;z-index:30;
  background:linear-gradient(180deg,transparent,rgba(9,32,16,.72) 40%)}
.hudp{display:flex;align-items:center;gap:8px;font-weight:800;font-size:clamp(14px,1.9vw,22px);text-shadow:0 2px 3px rgba(0,0,0,.6)}
.hudp .dotc{width:16px;height:16px;border-radius:50%;box-shadow:0 0 0 3px rgba(255,255,255,.25)}
.hudp.out{opacity:.45;filter:saturate(.4)}
.timerbig{position:absolute;right:16px;top:12px;z-index:35;font-size:clamp(26px,4vw,48px);font-weight:800;color:#fff;text-shadow:0 3px 0 rgba(0,0,0,.4)}
.timerbig.urgent{color:#ff6b5e;animation:pulse .5s infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.14)}}
.centercard{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:38;background:rgba(6,26,13,.55)}
.instr{max-width:min(720px,86%);background:var(--paper);color:var(--ink);border-radius:22px;padding:26px 30px;box-shadow:var(--shadow);border:5px solid var(--wood-lite)}
.instr h2{font-size:clamp(26px,4vw,44px);color:var(--jungle);margin-bottom:8px}
.instr p{font-size:clamp(16px,2.2vw,23px);font-weight:600;line-height:1.35}
.instr .how{margin-top:12px;font-weight:800;color:var(--red-dark)}
.skiphint{color:var(--sand);font-weight:700;font-size:clamp(14px,1.8vw,19px);animation:pulse 1s infinite alternate}
.count{font-size:clamp(90px,18vw,220px);font-weight:800;color:var(--sand);text-shadow:0 8px 0 var(--jungle-deep),0 16px 40px rgba(0,0,0,.5)}
.qrbox{background:var(--paper);border-radius:18px;padding:12px;box-shadow:var(--shadow)}
.lobbygrid{display:flex;gap:26px;align-items:center;justify-content:center;flex-wrap:wrap}
.monkrow{display:flex;gap:22px;justify-content:center;flex-wrap:wrap}
.monkslot{width:clamp(120px,16vw,190px);display:flex;flex-direction:column;align-items:center;gap:6px}
.monkslot .nm{font-weight:800;font-size:clamp(15px,2vw,22px);text-shadow:0 2px 3px rgba(0,0,0,.5)}
.monkslot .waiting{opacity:.35;font-style:italic;font-weight:600}
.bananarow{display:flex;align-items:center;gap:4px;font-size:clamp(16px,2.2vw,26px);font-weight:800}
.feed{position:absolute;left:16px;top:12px;z-index:34;display:flex;flex-direction:column;gap:5px;max-width:34%}
.feeditem{background:rgba(9,42,21,.8);border-radius:10px;padding:4px 12px;font-size:clamp(11px,1.4vw,15px);font-weight:600;animation:fin .3s}
@keyframes fin{from{opacity:0;transform:translateX(-12px)}to{opacity:1}}

/* podium */
.podium{display:flex;align-items:flex-end;gap:18px;justify-content:center}
.pod{display:flex;flex-direction:column;align-items:center;gap:8px}
.pod .base{width:clamp(90px,12vw,150px);border-radius:10px 10px 0 0;background:linear-gradient(180deg,var(--wood-lite),var(--wood));display:flex;align-items:flex-start;justify-content:center;font-weight:800;font-size:26px;color:var(--sand);padding-top:6px;box-shadow:var(--shadow)}

/* ---------- Phone controller: the buzzer ---------- */
.buzzer{flex:1;display:flex;flex-direction:column;padding:12px;gap:10px;max-width:520px;width:100%;margin:0 auto;min-height:0}
.bz-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:2px 6px}
.bz-name{font-weight:800;font-size:18px;display:flex;align-items:center;gap:8px}
.bz-name .dotc{width:14px;height:14px;border-radius:50%}
.bz-score{font-weight:800;font-size:16px;color:var(--sand)}
.bz-prompt{min-height:44px;background:rgba(9,42,21,.8);border:2px solid rgba(246,227,180,.3);border-radius:12px;
  display:flex;align-items:center;justify-content:center;text-align:center;font-weight:700;font-size:16px;padding:6px 12px;color:var(--sand)}
.bz-body{flex:1;display:flex;flex-direction:column;gap:10px;min-height:0;
  background:linear-gradient(180deg,#2a2d33,#17191d);border-radius:26px;padding:16px;box-shadow:inset 0 2px 6px rgba(255,255,255,.14),var(--shadow);border:2px solid #000}
.bz-red{flex:0 0 auto;position:relative;border-radius:50%;aspect-ratio:1;align-self:center;width:min(41vw,169px,25vh);
  background:radial-gradient(circle at 38% 30%,#ff8577,#f00 55%,#c40b00 100%);
  box-shadow:0 8px 0 #9c0900,0 13px 22px rgba(0,0,0,.55),inset 0 -7px 15px rgba(0,0,0,.25);
  transition:transform .05s,box-shadow .05s}
.bz-red:active,.bz-red.down{transform:translateY(6px);box-shadow:0 2px 0 #9c0900,0 5px 10px rgba(0,0,0,.5),inset 0 -4px 10px rgba(0,0,0,.3)}
.bz-red:disabled{filter:grayscale(.75) brightness(.6)}
.bz-red span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(20px,6vw,30px);font-weight:800;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.5)}
.bz-col{flex:1;min-height:52px;border-radius:14px;font-size:20px;font-weight:800;color:rgba(255,255,255,.92);text-shadow:0 1px 3px rgba(0,0,0,.45);
  box-shadow:0 6px 0 rgba(0,0,0,.45),inset 0 2px 4px rgba(255,255,255,.35);transition:transform .05s,box-shadow .05s}
.bz-col:active,.bz-col.down{transform:translateY(5px);box-shadow:0 1px 0 rgba(0,0,0,.45),inset 0 2px 4px rgba(0,0,0,.25)}
.bz-col:disabled{filter:grayscale(.8) brightness(.5)}
/* buttons must read as the exact player colours used on the TV (totem heads,
   hole rings, hurdles): pure hex from 40% down, only a thin sheen on top */
.bz-col.blue{background:linear-gradient(180deg,#3385ff,var(--p-blue) 40%)}
.bz-col.orange{background:linear-gradient(180deg,#ff8f33,var(--p-orange) 40%)}
.bz-col.green{background:linear-gradient(180deg,#33d958,var(--p-green) 40%)}
.bz-col.yellow{background:linear-gradient(180deg,#ffe633,var(--p-yellow) 40%);color:#6b5900;text-shadow:none}
.bz-cols{flex:1;display:flex;align-items:stretch;gap:6px;min-height:0}
.bz-colstack{width:50%;display:flex;flex-direction:column;gap:10px;min-height:0}
.togg{flex:1;background:none;border:none;font-size:22px;opacity:.75;display:flex;align-items:center;justify-content:center}

/* ---------- scenery & motion ---------- */
.scenery{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.scenery svg{width:100%;height:100%;display:block}
.cloud1{animation:cloudmove 70s linear infinite}
.cloud2{animation:cloudmove 95s linear infinite;animation-delay:-40s}
@keyframes cloudmove{from{transform:translateX(-340px)}to{transform:translateX(1940px)}}
.vinesway,.vinesway2{transform-box:fill-box;transform-origin:50% 0}
.vinesway{animation:sway 3.6s ease-in-out infinite alternate}
.vinesway2{animation:sway 4.4s ease-in-out infinite alternate-reverse}
@keyframes sway{from{transform:rotate(-4deg)}to{transform:rotate(4deg)}}
.treesway{transform-box:fill-box;transform-origin:50% 100%;animation:treesway 5.2s ease-in-out infinite alternate}
@keyframes treesway{from{transform:rotate(-1.4deg)}to{transform:rotate(1.4deg)}}
.bobble{animation:bobble 2.4s ease-in-out infinite}
@keyframes bobble{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.winbounce{animation:winbounce .85s ease-in-out infinite}
@keyframes winbounce{0%,100%{transform:translateY(0)}45%{transform:translateY(-14px)}}
.count.pop{animation:countpop .55s cubic-bezier(.2,1.6,.4,1) both}
@keyframes countpop{from{transform:scale(.2) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}
.instr{animation:cardin .4s cubic-bezier(.2,1.4,.4,1) both}
@keyframes cardin{from{transform:translateY(36px) scale(.85);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.pod .base{transform-origin:bottom;animation:podrise .8s cubic-bezier(.2,1.3,.4,1) both}
@keyframes podrise{from{transform:scaleY(0)}to{transform:scaleY(1)}}
.pod .nm{font-weight:800;text-shadow:0 2px 3px rgba(0,0,0,.5)}

/* ---------- critters, foreground canopy & celebration fx ---------- */
.bfly{animation:bflyA 26s linear infinite}
.bfly2{animation:bflyB 34s linear infinite}
@keyframes bflyA{0%{transform:translate(-60px,560px)}25%{transform:translate(420px,400px)}50%{transform:translate(860px,540px)}75%{transform:translate(1240px,380px)}100%{transform:translate(1700px,500px)}}
@keyframes bflyB{0%{transform:translate(1700px,330px)}30%{transform:translate(1100px,480px)}60%{transform:translate(600px,340px)}100%{transform:translate(-80px,450px)}}
.bwingL{transform-box:fill-box;transform-origin:100% 50%;animation:flap .34s ease-in-out infinite alternate}
.bwingR{transform-box:fill-box;transform-origin:0% 50%;animation:flap .34s ease-in-out infinite alternate}
@keyframes flap{from{transform:scaleX(1)}to{transform:scaleX(.25)}}
.birdfly{animation:birdfly 47s linear infinite}
@keyframes birdfly{0%{transform:translate(-160px,150px)}38%{transform:translate(1760px,80px)}100%{transform:translate(1760px,80px)}}
.birdwing{transform-box:fill-box;transform-origin:50% 90%;animation:birdflap .42s ease-in-out infinite alternate}
@keyframes birdflap{from{transform:rotate(-24deg)}to{transform:rotate(30deg)}}
.headbob{transform-box:fill-box;transform-origin:50% 100%;animation:headbob 3.4s ease-in-out infinite}
@keyframes headbob{0%,64%,100%{transform:rotate(0)}74%{transform:rotate(-10deg)}86%{transform:rotate(7deg)}}
.shroomglow{animation:shroom 2.8s ease-in-out infinite alternate}
@keyframes shroom{from{opacity:.5}to{opacity:1}}
.scenery-fg{z-index:12}
.fgsway{transform-box:fill-box;transform-origin:0% 0%;animation:sway 5.4s ease-in-out infinite alternate}
.confetti{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:41}
.conf{position:absolute;width:9px;height:13px;top:-20px;border-radius:2px;animation:conffall linear infinite}
@keyframes conffall{0%{opacity:1}90%{opacity:1}100%{transform:translateY(105vh) rotate(680deg);opacity:.35}}
.tapeflap{transform-origin:top center;animation:tapeflap .9s ease-in-out infinite alternate}
@keyframes tapeflap{from{transform:rotate(12deg)}to{transform:rotate(30deg)}}

#fireworks{position:fixed;inset:0;pointer-events:none;z-index:60}
.viewer-mode .tv-stage{margin:0 12px 12px}
@media (max-height:560px){.bz-red{width:min(41vw,169px,20vh)}}
</style>
</head>
<body>
<canvas id="fireflies"></canvas>
<div id="app"></div>
<canvas id="fireworks"></canvas>
<script>
'use strict';
/* =====================================================================
   JUNGLE PARTY — a fan-made, original-asset recreation of the play style
   of Buzz! Junior: Jungle Party (Magenta/SCEE 2006), with phones as
   Buzz!-style buzzer controllers. Architecture after boggleparty.html:
   PeerJS host-authoritative networking, deterministic room-code peer IDs,
   Web-Audio-synthesized music & SFX, single self-contained file.
   All art and audio here is original. Research: see wiki/ folder.
   ===================================================================== */

/* ---------- constants ---------- */
const PREFIX='BZJP-';
const ALPHA='ABCDEFGHJKLMNPQRSTUVWXYZ';
const COLORS=[
 {id:'blue',  name:'Blue',  hex:'#0066ff', dark:'#0047b3'},
 {id:'orange',name:'Orange',hex:'#ff7300', dark:'#c25500'},
 {id:'green', name:'Green', hex:'#00d02e', dark:'#009421'},
 {id:'yellow',name:'Yellow',hex:'#ffe000', dark:'#c9ab00'},
];
const BTNS=['red','blue','orange','green','yellow'];
const LENGTHS=[{id:'short',label:'Short',rounds:4},{id:'medium',label:'Medium',rounds:6},{id:'long',label:'Long',rounds:8}];
const BANANAS=[4,3,2,1]; // per placement 1st..4th

/* ---------- tiny helpers ---------- */
const $=s=>document.querySelector(s);
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const rnd=(a,b)=>a+Math.random()*(b-a);
const ri=(a,b)=>Math.floor(rnd(a,b+1));
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=ri(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;};
function makeCode(){let c='';for(let i=0;i<4;i++)c+=ALPHA[ri(0,ALPHA.length-1)];return c;}

/* =====================================================================
   AUDIO — everything synthesized, no files. Lazy unlock on first tap.
   ===================================================================== */
let AC=null,musicGain=null,sfxGain=null,echoS=null,echoM=null,
    musicOn=localStorage.getItem('jp-music')!=='0',sfxOn=localStorage.getItem('jp-sfx')!=='0';
function makeEcho(dest){ // slapback delay bus (feeds dest so mute toggles apply)
  const inp=AC.createGain();inp.gain.value=1;
  const d=AC.createDelay(1);d.delayTime.value=.27;
  const fb=AC.createGain();fb.gain.value=.34;
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=1500;
  const out=AC.createGain();out.gain.value=.55;
  inp.connect(d);d.connect(lp);lp.connect(fb);fb.connect(d);lp.connect(out);out.connect(dest);
  return inp;
}
function audioInit(){
  if(AC)return;
  try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return;}
  musicGain=AC.createGain();musicGain.gain.value=musicOn?0.5:0;musicGain.connect(AC.destination);
  sfxGain=AC.createGain();sfxGain.gain.value=sfxOn?0.9:0;sfxGain.connect(AC.destination);
  echoS=makeEcho(sfxGain);echoM=makeEcho(musicGain);
  startMusicLoop();
}
document.addEventListener('pointerdown',()=>{audioInit();if(AC&&AC.state==='suspended')AC.resume();},{capture:true});

function tone(o){ // {f, f2, t=osc type, d, v, when, dest, attack, echo, vibF, vibD, spread}
  if(!AC)return;
  const t0=AC.currentTime+(o.when||0),d=o.d||.2,dest=o.dest||sfxGain;
  const g=AC.createGain();
  const v=(o.v||.5),a=o.attack||0.004;
  g.gain.setValueAtTime(0.0001,t0);g.gain.exponentialRampToValueAtTime(v,t0+a);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+d);
  g.connect(dest);
  if(o.echo&&echoS){const s=AC.createGain();s.gain.value=o.echo;g.connect(s);s.connect(dest===musicGain?echoM:echoS);}
  const mk=det=>{
    const osc=AC.createOscillator();osc.type=o.t||'sine';
    osc.frequency.setValueAtTime(o.f,t0);if(det)osc.detune.value=det;
    if(o.f2)osc.frequency.exponentialRampToValueAtTime(Math.max(1,o.f2),t0+d);
    if(o.vibF){const l=AC.createOscillator(),lg=AC.createGain();
      l.frequency.value=o.vibF;lg.gain.value=o.vibD||6;
      l.connect(lg);lg.connect(osc.frequency);l.start(t0);l.stop(t0+d+.05);}
    osc.connect(g);osc.start(t0);osc.stop(t0+d+.05);
  };
  mk(0);if(o.spread)mk(o.spread);
}
function noise(o){ // {d, v, fc, fc2, q, when, dest, type, echo} filtered noise burst
  if(!AC)return;
  const t0=AC.currentTime+(o.when||0),d=o.d||.15,dest=o.dest||sfxGain;
  const len=Math.max(1,Math.floor(AC.sampleRate*d));
  const buf=AC.createBuffer(1,len,AC.sampleRate);
  const ch=buf.getChannelData(0);for(let i=0;i<len;i++)ch[i]=Math.random()*2-1;
  const src=AC.createBufferSource();src.buffer=buf;
  const f=AC.createBiquadFilter();f.type=o.type||'lowpass';f.frequency.setValueAtTime(o.fc||800,t0);
  if(o.fc2)f.frequency.exponentialRampToValueAtTime(o.fc2,t0+d);
  if(o.q)f.Q.value=o.q;
  const g=AC.createGain();g.gain.setValueAtTime(o.v||.4,t0);g.gain.exponentialRampToValueAtTime(0.0001,t0+d);

function startMusicLoop(){

    tr.play(musicStep%tr.pat);musicStep++;};
  const sched=()=>{const tr=MTRACKS[musicTrack]||MTRACKS.lobby;
    if(musicTimer)clearInterval(musicTimer);
    musicTimer=setInterval(step,60000/(tr.bpm*(musicUrgent?4.6:4)));};
  sched();startMusicLoop._resched=sched;
}
function setMusic(track,urgent=false){
  if(musicTrack===track&&musicUrgent===urgent)return;
  musicTrack=track;musicUrgent=urgent;musicStep=0;

}

}

}

/* =====================================================================
   POSE BLENDING — springs every rig parameter toward its pose target so
   pose changes flow instead of snapping (the original's reviewers called
   its transitions "seamless"; this is our equivalent). Slightly
   underdamped for cartoon anticipation/overshoot. Fast cycles arrive via
   the additive A channel after the spring, so they are never damped.
   Keyed per entity; cleared at each mini-game start.
   ===================================================================== */
const ANIM=new Map();
function springTo(a,target,dt){
  const w=15,z=.62; // underdamped: visible overshoot on big pose changes
  for(const k in target){
    const tg=target[k];let x=a.x[k],v=a.v[k]||0;
    if(x===undefined){a.x[k]=tg;a.v[k]=0;continue;}
    v+=(w*w*(tg-x)-2*z*w*v)*dt;x+=v*dt;
    a.x[k]=x;a.v[k]=v;
  }

function monkeyEase(key,colorId,pose,extra,t){
  const {P,A,D}=monkeyPose(pose,t,colorId);

  let a=ANIM.get(key);
  if(!a||t<a.lt-.5){a={x:{...P},v:{},lt:t};ANIM.set(key,a);}
  const dt=clamp(t-a.lt,0,.05);a.lt=t;
  if(dt>0)springTo(a,P,dt);
  const q={};for(const k in P)q[k]=a.x[k]+(A[k]||0);
  return monkeyRender(colorId,q,D,extra);
}

 rounds:6,round:0,order:[],mini:null,miniState:null,results:null,feed:[],feedSeq:0,
};
function feed(txt){H.feed.unshift({id:++H.feedSeq,txt});H.feed=H.feed.slice(0,8);}
function playerByConnId(id){return H.players.find(p=>p.id===id);}
function hostAddPlayer(id,name){
  const reclaim=H.players.find(p=>!p.connected&&p.name===name);
  if(reclaim){reclaim.id=id;reclaim.connected=true;feed(`${name} re-joined`);return reclaim;}
  if(H.players.length>=4)return null;
  const used=H.players.map(p=>p.color);
  const color=COLORS.find(c=>!used.includes(c.id)).id;
  const p={id,name,color,bananas:0,connected:true,captain:H.players.length===0};
  H.players.push(p);feed(`${name} joined as ${color}`);S.monkey();return p;
}
function hostStart(){
  if(!peer){
    roomCode=makeCode();
    peer=new Peer(PREFIX+roomCode);
    peer.on('open',()=>{isHost=true;ui='tvlobby';render();});
    peer.on('connection',conn=>{
      conn.on('data',m=>hostOnMsg(conn,m));
      conn.on('close',()=>hostDrop(conn));
      conn.on('error',()=>hostDrop(conn));
    });
    peer.on('error',e=>{
      if(e.type==='unavailable-id'){peer.destroy();peer=null;hostStart();}
      else{uiErr='Connection error: '+e.type;ui='home';render();}
    });
  }
}
function hostDrop(conn){
  const i=conns.findIndex(c=>c.conn===conn);if(i<0)return;
  const {role,pid}=conns[i];conns.splice(i,1);
  if(role==='player'){const p=playerByConnId(pid);
    if(p){if(H.phase==='lobby'){H.players=H.players.filter(x=>x!==p);if(p.captain&&H.players[0])H.players[0].captain=true;feed(`${p.name} left`);}
      else{p.connected=false;feed(`${p.name} disconnected`);}}}
  pushAll();
}
function hostOnMsg(conn,m){
  if(!m||typeof m!=='object')return;
  let entry=conns.find(c=>c.conn===conn);
  if(!entry){
    if(m.type==='join_viewer'){conns.push({conn,role:'viewer',pid:null});sendViewerState(conn);return;}
    if(m.type==='join'){
      const p=hostAddPlayer(conn.peer,String(m.name||'Monkey').slice(0,14));
      if(!p){send(conn,{type:'full'});return;}
      conns.push({conn,role:'player',pid:conn.peer});
      pushAll();return;
    }
    return;
  }
  if(entry.role==='player'){
    const p=playerByConnId(entry.pid);if(!p)return;
    if(m.type==='buzz')hostOnBuzz(p,m.btn,!!m.down);
    if(m.type==='ctl'&&p.captain)hostCtl(m);
  }
}
function hostCtl(m){
  if(m.action==='start'&&H.phase==='lobby'&&H.players.length>=1){H.rounds=(LENGTHS.find(l=>l.id===m.len)||LENGTHS[1]).rounds;hostBeginParty();}
  if(m.action==='skip'&&H.phase==='instruct')hostCountdown();
  if(m.action==='again'&&H.phase==='podium')hostReset();
}
function hostReset(){H.phase='lobby';H.round=0;H.players.forEach(p=>p.bananas=0);H.mini=null;setMusic('lobby');pushAll();}
function hostBeginParty(){
  H.round=0;H.players.forEach(p=>p.bananas=0);
  H.order=[];
  while(H.order.length<H.rounds){
    let pool=shuffle(Object.keys(GAMES).slice());
    if(H.order.length&&pool[0]===H.order[H.order.length-1])pool.push(pool.shift());
    H.order=H.order.concat(pool);
  }
  H.order=H.order.slice(0,H.rounds);
  hostNextMini();
}
function hostNextMini(){
  if(H.round>=H.rounds){hostPodium();return;}
  H.mini=H.order[H.round];H.round++;
  H.phase='instruct';H.results=null;
  const g=GAMES[H.mini];
  setMusic('results');
  say(g.name+'. '+g.voice);
  pushAll();
}
function hostCountdown(){
  H.phase='countdown';H.countN=3;pushAll();
  let n=3;S.drumroll();S.tick();
  const iv=setInterval(()=>{
    n--;H.countN=n;
    if(n>0){S.tick();pushAll();}
    else{clearInterval(iv);S.tickHi();hostPlay();}
  },900);
}
function hostPlay(){
  H.phase='playing';setMusic('game');
  ANIM.clear(); // fresh pose-blend state per mini-game
  const g=GAMES[H.mini];
  H.miniState=g.start({players:H.players.filter(p=>p.connected)});
  pushAll();
  let last=performance.now(),lastPush=0;
  const loop=t=>{
    if(H.phase!=='playing')return;
    const dt=Math.min(.05,(t-last)/1000);last=t;
    const done=g.tick(H.miniState,dt);
    tvPatchGame();
    if(t-lastPush>200){lastPush=t;broadcastPlayers(pid=>stateFor(pid));}
    if(done)hostEndMini();else requestAnimationFrame(loop);
  };
  requestAnimationFrame(loop);
}
function hostOnBuzz(p,btn,down){
  if(H.phase==='instruct'&&btn==='red'&&down){hostCountdown();return;}
  if(H.phase==='miniresults'&&btn==='red'&&down&&p.captain){hostNextMini();return;}
  if(H.phase==='podium'&&btn==='red'&&down&&p.captain){hostReset();return;}
  if(H.phase==='playing'&&H.miniState)GAMES[H.mini].onBuzz(H.miniState,p,btn,down);
}
function hostEndMini(){
  const g=GAMES[H.mini];
  const placements=g.end(H.miniState); // [{id,name,color,score,place}]
  placements.forEach(pl=>{const p=H.players.find(x=>x.id===pl.id);if(p)p.bananas+=BANANAS[pl.place-1]||0;});
  H.results=placements;H.phase='miniresults';setMusic('results');
  const w=placements.find(p=>p.place===1);
  if(w){say('Well done, '+w.color+'!');S.fanfare();}
  feed((w?w.name:'Nobody')+' won '+g.name);
  pushAll();
}
function hostPodium(){
  H.phase='podium';setMusic('podium');
  const sorted=[...H.players].sort((a,b)=>b.bananas-a.bananas);
  H.finalOrder=sorted.map(p=>p.id);
  if(sorted[0])say(sorted[0].color+' is the King of the Jungle!');
  startFireworks();
  pushAll();
}

/* per-player state pushes */
function stateFor(pid){
  const p=playerByConnId(pid);
  const g=H.mini?GAMES[H.mini]:null;
  const base={type:'state',phase:H.phase,round:H.round,rounds:H.rounds,
    mini:H.mini,miniName:g?g.name:'',countN:H.countN,
    players:H.players.map(x=>({name:x.name,color:x.color,bananas:x.bananas,connected:x.connected,captain:x.captain})),
    me:p?{name:p.name,color:p.color,bananas:p.bananas,captain:p.captain}:null,
    results:H.results};
  if(H.phase==='playing'&&g&&p){Object.assign(base,g.ctrl(H.miniState,p));}
  else if(H.phase==='instruct'&&g){base.buttons={red:true};base.prompt=g.name+' — '+g.short+'  (RED to start)';}
  else if(H.phase==='miniresults'){base.buttons={red:!!(p&&p.captain)};base.prompt=p&&p.captain?'RED for the next game!':'Waiting for the captain…';}
  else if(H.phase==='podium'){base.buttons={red:!!(p&&p.captain)};base.prompt='Party over!'+(p&&p.captain?' RED to play again.':'');}
  else{base.buttons={};base.prompt='';}
  return base;
}
function sendViewerState(conn){send(conn,{type:'vstate',phase:H.phase,players:H.players,feed:H.feed,room:roomCode});}
function pushAll(){
  broadcastPlayers(pid=>stateFor(pid));
  broadcastViewers({type:'vstate',phase:H.phase,players:H.players,feed:H.feed,room:roomCode});
  if(isHost)render();
}

/* ---------- guest (controller / viewer) ---------- */
let G={state:null,pressed:{}};
function joinGame(code,name){
  myName=name;localStorage.setItem('jp-name',name);
  ui='connecting';uiErr='';render();
  peer=new Peer();
  peer.on('open',()=>{
    hostConn=peer.connect(PREFIX+code.trim().toUpperCase(),{reliable:true});
    hostConn.on('open',()=>send(hostConn,{type:'join',name}));
    hostConn.on('data',m=>guestOnMsg(m));
    hostConn.on('close',()=>{uiErr='Lost connection to the party.';ui='home';render();});
  });
  peer.on('error',e=>{uiErr=e.type==='peer-unavailable'?'Party not found — check the code!':'Connection error.';ui='home';render();});
}
function guestOnMsg(m){
  if(m.type==='full'){uiErr='Party is full (4 monkeys max)!';ui='home';render();return;}
  if(m.type==='state'){
    const prev=G.state;G.state=m;
    if(prev&&prev.phase!==m.phase){
      if(m.phase==='countdown')S.tick();
      if(m.phase==='playing')S.good();
      if(m.phase==='miniresults'){const me=m.results&&m.results.find(r=>r.name===m.me.name);if(me&&me.place===1)S.fanfare();else S.press();}
      if(m.phase==='podium')S.fanfare();
    }
    // in-place patch during play so held buttons keep their DOM elements
    if(prev&&prev.phase===m.phase&&(m.phase==='playing'||m.phase==='countdown')&&ui==='buzzer'&&$('.buzzer')){patchBuzzer(m);return;}
    ui='buzzer';render();
  }
}
function sendBuzz(btn,down){
  if(!hostConn)return;
  send(hostConn,{type:'buzz',btn,down});
  if(down){S.press();if(navigator.vibrate)navigator.vibrate(btn==='red'?30:15);}
}

function qrSVG(text,size){
  const qr=qrcode(0,'M');qr.addData(text);qr.make();
  const n=qr.getModuleCount(),cell=size/n;let rects='';
  for(let r=0;r<n;r++)for(let c=0;c<n;c++)if(qr.isDark(r,c))rects+=`<rect x="${(c*cell).toFixed(2)}" y="${(r*cell).toFixed(2)}" width="${Math.ceil(cell)}" height="${Math.ceil(cell)}"/>`;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" fill="#123c22">${rects}</svg>`;
}
function hudHTML(){
  return `<div class="hudrow">${H.players.map(p=>{const c=COLORS.find(x=>x.id===p.color);

/* light-touch DOM patch during play: re-render only the stage */
function tvPatchGame(){
  if(!isHost||H.phase!=='playing')return;

/* ---------- Phone buzzer rendering ---------- */
function renderBuzzer(app){
  const st=G.state;if(!st){app.innerHTML='';return;}
  const me=st.me,c=me?COLORS.find(x=>x.id===me.color):COLORS[0];
  let prompt=st.prompt||'';
  if(st.phase==='lobby'){
    prompt=me&&me.captain?'You are the captain! Pick the party length:':'Waiting for the captain to start…';
  }
  if(st.phase==='countdown')prompt=st.countN>0?String(st.countN):'GO!';
  const btns=st.buttons||{};
  const lobbyLen=st.phase==='lobby'&&me&&me.captain
    ?`<div class="pillrow">${LENGTHS.map(l=>`<button class="pill" style="background:var(--jungle-lite)" onclick="ctl('start','${l.id}')">${l.label} · ${l.rounds}</button>`).join('')}</div>`:'';
  app.innerHTML=`<div class="buzzer">
    <div class="bz-head">
      <div class="bz-name"><span class="dotc" style="background:${c.hex}"></span>${esc(me?me.name:'')}</div>
      <div class="bobble" style="width:52px;height:64px">${monkeySVG(c.id,(()=>{ // little monkey mirrors your fortunes
        if(!me)return 'idle';
        if(st.phase==='miniresults'&&st.results){const r=st.results.find(x=>x.name===me.name);
          return r&&r.place===1?'cheer':r&&r.place>=Math.min(4,st.results.length)&&st.results.length>1?'mourn':'idle';}
        if(st.phase==='podium'){const best=Math.max(...st.players.map(p=>p.bananas));
          return me.bananas>=best?'cheer':'mourn';}
        return 'idle';})())}</div>
      <div class="bz-score">🍌 ${me?me.bananas:0}</div>
    </div>
    <div class="bz-prompt">${esc(prompt)}</div>
    ${lobbyLen}
    <div class="bz-body">
      <button class="bz-red" id="btn-red" ${btns.red?'':'disabled'}><span>BUZZ!</span></button>
      <div class="bz-cols">
        <button class="togg" onclick="toggleSfx();this.textContent=sfxOn?'🔊':'🔇'">${sfxOn?'🔊':'🔇'}</button>
        <div class="bz-colstack">
          ${['blue','orange','green','yellow'].map(b=>`<button class="bz-col ${b}" id="btn-${b}" ${btns[b]?'':'disabled'}>${btns[b+'Label']?esc(btns[b+'Label']):''}</button>`).join('')}
        </div>
        <button class="togg" onclick="toggleMusic();this.textContent=musicOn?'🎵':'🚫🎵'">${musicOn?'🎵':'🚫🎵'}</button>
      </div>
    </div>
  </div>`;
  BTNS.forEach(b=>{
    const el=$('#btn-'+b);if(!el)return;
    el.addEventListener('pointerdown',e=>{e.preventDefault();if(el.disabled)return;el.classList.add('down');sendBuzz(b,true);});
    el.addEventListener('pointerup',e=>{e.preventDefault();el.classList.remove('down');sendBuzz(b,false);});
    el.addEventListener('pointercancel',()=>{el.classList.remove('down');sendBuzz(b,false);});
  });
}
window.ctl=(action,len)=>{send(hostConn,{type:'ctl',action,len});};
/* update prompt/buttons/score without replacing DOM (held buttons survive) */
function patchBuzzer(st){
  const pr=$('.bz-prompt');
  if(pr){
    let prompt=st.prompt||'';
    if(st.phase==='countdown')prompt=st.countN>0?String(st.countN):'GO!';
    if(pr.textContent!==prompt)pr.textContent=prompt;
  }
  const btns=st.buttons||{};
  BTNS.forEach(b=>{
    const el=$('#btn-'+b);if(!el)return;
    const on=!!btns[b];
    if(el.disabled===on)el.disabled=!on;
    if(b!=='red'){
      const lab=btns[b+'Label']||'';
      if(el.textContent!==lab)el.textContent=lab;
    }
  });
  const sc=$('.bz-score');
  if(sc&&st.me)sc.textContent='🍌 '+st.me.bananas;
}

/* =====================================================================
   FIREFLIES + FIREWORKS (canvas ambience, blueprint pattern)
   ===================================================================== */
(function(){
  const cv=$('#fireflies'),ctx=cv.getContext('2d');
  let fs=[];function resize(){cv.width=innerWidth;cv.height=innerHeight;}
  addEventListener('resize',resize);resize();
  for(let i=0;i<26;i++)fs.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,p:Math.random()*6.28,s:rnd(.2,.7)});
  (function loop(){ctx.clearRect(0,0,cv.width,cv.height);
    fs.forEach(f=>{f.p+=.02;f.x+=Math.cos(f.p)*f.s;f.y+=Math.sin(f.p*.7)*f.s;
      if(f.x<0)f.x=cv.width;if(f.x>cv.width)f.x=0;if(f.y<0)f.y=cv.height;if(f.y>cv.height)f.y=0;
      const a=.25+.25*Math.sin(f.p*3);ctx.fillStyle=`rgba(255,240,150,${a})`;
      ctx.beginPath();ctx.arc(f.x,f.y,2,0,6.28);ctx.fill();});
    requestAnimationFrame(loop);})();
})();
let fwOn=false;
function startFireworks(){
  if(fwOn)return;fwOn=true;
  const cv=$('#fireworks'),ctx=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;
  let ps=[],t0=performance.now();
  function burst(){const x=rnd(cv.width*.2,cv.width*.8),y=rnd(cv.height*.15,cv.height*.5),hue=ri(0,360);
    for(let i=0;i<40;i++){const a=rnd(0,6.28),v=rnd(1,4.5);ps.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,l:rnd(.6,1.2),hue});}S.boom();}
  burst();
  (function loop(t){
    if(t-t0>9000&&ps.length===0){fwOn=false;ctx.clearRect(0,0,cv.width,cv.height);return;}
    if(Math.random()<.03&&t-t0<8000)burst();
    ctx.clearRect(0,0,cv.width,cv.height);
    ps=ps.filter(p=>p.l>0);
    ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.l-=.012;
      ctx.fillStyle=`hsla(${p.hue},90%,60%,${p.l})`;ctx.beginPath();ctx.arc(p.x,p.y,2.4,0,6.28);ctx.fill();});
    requestAnimationFrame(loop);})(t0);
}

/* =====================================================================
   MINI-GAMES — module registry. Each: {name, short, desc, how, voice,
   night?, start(ctx)->st, tick(st,dt)->done, onBuzz(st,p,btn,down),
   ctrl(st,p)->{buttons,prompt}, tv(st)->html, end(st)->placements}
   Placement helper below.
   ===================================================================== */
function placeByScore(entries){ // entries: [{p,score}] high wins
  const sorted=[...entries].sort((a,b)=>b.score-a.score);
  let place=0,prev=null,out=[];
  sorted.forEach((e,i)=>{if(prev===null||e.score<prev){place=i+1;prev=e.score;}
    out.push({id:e.p.id,name:e.p.name,color:e.p.color,score:Math.round(e.score),place});});
  return out;
}

function timerHTML(st){const left=Math.max(0,Math.ceil(st.dur-st.t));return `<div class="timerbig ${left<=5?'urgent':''}">${left}</div>`;}
function activeP(st){return st.ps.map(e=>e.p);}

/* ---------- 4. MONKEY BOMB — hot potato (Luck & tactics) ---------- */
GAMES.monkeybomb={
 name:'Monkey Bomb',short:'Hold the bomb for points… pass it before it BOOMS!',
 desc:'Someone lit a bomb and nobody knows how long the fuse is! Holding it earns points, but the monkey hugging it at the bang loses everything — and then some.',
 how:'When YOU have the bomb, press another monkey\'s colour button to throw it. Hold longer for more points… if you dare!',
 voice:'Press the colour of the monkey you want to throw the bomb to. Don\'t be holding it when it explodes!',
 /* Verified vs longplay (wiki/monkey-bomb.md): 6 bombs per game; hidden fuse
    ~8-12s; ~55 pts/s held; totals clamp at 0; the loser starts the next bomb;
    immediate pass-backs are legal; flight ~0.6s. */
 start(ctx){const ps=ctx.players.map(p=>({p,score:0,round:0}));
   return {t:0,dur:999,ps,holder:ri(0,ps.length-1),fuse:rnd(8,12),bombRound:1,bombRounds:6,flight:0,flightTo:null,boomT:0};},
 tick(st,dt){
   st.t+=dt;
   if(st.boomT>0){st.boomT-=dt;
     if(st.boomT<=0){
       if(st.bombRound>=st.bombRounds)return true;
       st.bombRound++;st.ps.forEach(e=>{e.score+=e.round;e.round=0;});
       st.holder=st.lastLoser!=null?st.lastLoser:ri(0,st.ps.length-1);st.fuse=rnd(8,12);}
     return false;}
   if(st.flight>0){st.flight-=dt;
     if(st.flight<=0){st.holder=st.flightTo;st.flightTo=null;}
     return false;}
   st.fuse-=dt;
   const h=st.ps[st.holder];
   h.round+=55*dt;
   if(Math.random()<dt*2)S.tick();
   if(st.fuse<=0){
     h.round=0;h.score=Math.max(0,h.score-100);st.lastLoser=st.holder;
     st.boomT=2.2;S.boom();S.screech();
     feedSafe(`${h.p.name} went BOOM!`);}
   return false;
 },
 onBuzz(st,p,btn,down){
   if(!down||btn==='red'||st.flight>0||st.boomT>0)return;
   if(st.ps[st.holder].p!==p)return;
   const ti=st.ps.findIndex(e=>e.p.color===btn);
   if(ti<0||ti===st.holder)return;
   st.flight=.7;st.flightFrom=st.holder;st.flightTo=ti;S.whoosh();
 },
 ctrl(st,p){
   const holding=st.boomT<=0&&st.flight<=0&&st.ps[st.holder]&&st.ps[st.holder].p===p;
   const btns={};
   if(holding)st.ps.forEach(e=>{if(e.p!==p){btns[e.p.color]=true;btns[e.p.color+'Label']=e.p.name;}});
   return {buttons:btns,prompt:holding?'YOU have the bomb! Throw it — or hold for points!':'Bomb '+st.bombRound+'/'+st.bombRounds+' — hope it stays away…'};
 },
 tv(st){
   const T=st.t;
   const posN=[[20,40],[80,40],[20,78],[80,78]];
   let bomb='';
   if(st.boomT>0){
     const p=Math.min(1,(2.2-st.boomT)/1.1);
     const P=posN[st.holder];
     bomb=`<div style="position:absolute;left:${P[0]}%;top:${P[1]}%;width:clamp(130px,24vw,300px);transform:translate(-50%,-58%);z-index:9">${burstSVG(p)}</div>
       <div style="position:absolute;left:${P[0]}%;top:${(P[1]+7).toFixed(0)}%;width:clamp(80px,13vw,170px);aspect-ratio:3.2;transform:translate(-50%,-50%);z-index:2;border-radius:50%;background:radial-gradient(ellipse,rgba(30,22,14,${(.55*Math.min(1,p*2)).toFixed(2)}),transparent 68%)"></div>`;
   }else if(st.flight>0&&st.flightTo!=null){
     const f=1-st.flight/.7;
     const A=posN[st.flightFrom!=null?st.flightFrom:st.holder],B=posN[st.flightTo];
     const x=A[0]+(B[0]-A[0])*f,y=A[1]+(B[1]-A[1])*f-Math.sin(f*Math.PI)*24;
     bomb=`<div style="position:absolute;left:${x.toFixed(1)}%;top:${y.toFixed(1)}%;width:clamp(38px,6.4vw,78px);transform:translate(-50%,-50%) rotate(${(f*540).toFixed(0)}deg);z-index:9">${bombSVG(1,T)}</div>`;
   }else{
     const P=posN[st.holder];
     bomb=`<div style="position:absolute;left:${P[0]}%;top:${P[1]}%;width:clamp(44px,7.6vw,92px);transform:translate(-50%,-128%);z-index:9">${bombSVG(clamp(st.fuse/12,0,1),T)}</div>`;
   }
   const shake=st.boomT>1.6?`transform:translate(${(Math.sin(T*60)*8).toFixed(1)}px,${(Math.cos(T*47)*6).toFixed(1)}px);`:'';
   return `<div style="position:absolute;inset:0;${shake}">
   <div style="position:absolute;left:0;right:0;top:7%;text-align:center;font-weight:800;font-size:clamp(16px,2.4vw,26px);color:var(--sand);text-shadow:0 2px 0 var(--jungle-deep)">Bomb ${st.bombRound} / ${st.bombRounds}${st.fuse<3&&st.boomT<=0&&st.flight<=0?' <span style="color:#ff5b4d">— it&#39;s hissing!</span>':''}</div>
   ${bomb}
   ${st.ps.map((e,i)=>{const P=posN[i];
     const holderNow=i===st.holder&&st.flight<=0;
     const pose=st.boomT>0&&i===st.holder?'zap'
       :st.flight>0&&i===st.flightFrom?'throw'
       :(holderNow&&st.boomT<=0?'hold':'idle');
     const ring=holderNow&&st.boomT<=0?`<div style="position:absolute;left:50%;top:93%;transform:translate(-50%,-50%);width:${(120+Math.sin(T*8)*10).toFixed(0)}%;aspect-ratio:3.2;border-radius:50%;border:4px solid rgba(255,220,60,.5);background:radial-gradient(ellipse,rgba(255,220,60,.18),transparent 70%)"></div>`:'';
     return `<div style="position:absolute;left:${P[0]}%;top:${P[1]}%;width:10%;min-width:74px;transform:translate(-50%,-50%);z-index:6">
       ${ring}${monkeyEase(e.p.id,e.p.color,pose,'',T+i)}
       <div style="text-align:center;font-weight:800;text-shadow:0 2px 3px rgba(0,0,0,.6)">${esc(e.p.name)}<br>${Math.round(e.score+e.round)}</div></div>`;}).join('')}
   </div>`;
 },
 end(st){st.ps.forEach(e=>{e.score+=e.round;e.round=0;});return placeByScore(st.ps.map(e=>({p:e.p,score:e.score})));},
};

/* ---------- 5. JUNGLE HURDLES — five-button race (Skill) ---------- */
GAMES.hurdles={
 name:'Jungle Hurdles',short:'Match each hurdle\'s colour — RED for banana skins!',
 desc:'On your marks! Coloured hurdles are coming — press the matching button to leap each one, and mind the banana skins: only the big red button clears those.',
 how:'Blue hurdle → blue button. Orange → orange. Green → green. Yellow → yellow. Banana skin → BIG RED!',
 voice:'Press the button that matches each hurdle, and the red button for banana skins!',
 /* Verified vs longplay (wiki/jungle-hurdles.md): shared colour waves every ~2s
    (four identical hurdles, one per lane), first over ~200 units wins (~35s),
    sprawl ~1.3s on miss, banana skins are solo per-lane extras (red button). */
 start(ctx){
   return {t:0,dur:60,LEN:200,SPEED:5.7,wave:null,nextWave:2.5,
     ps:ctx.players.map(p=>({p,dist:0,stumble:0,jump:0,done:null,banana:null,nextBanana:rnd(4,8),fx:''}))};},
 tick(st,dt){
   st.t+=dt;
   if(!st.wave&&st.t>=st.nextWave-1.8){st.wave={color:COLORS[ri(0,3)].id,at:st.nextWave,judged:new Set()};}
   if(st.wave&&st.t>st.wave.at+.3){ // late — sprawl everyone who missed
     st.ps.forEach(e=>{if(e.done===null&&!st.wave.judged.has(e)){e.stumble=1.3;e.fx='';S.splat();}});
     st.wave=null;st.nextWave=st.t+2.0;
   }
   st.ps.forEach(e=>{
     if(e.done!==null)return;
     e.stumble=Math.max(0,e.stumble-dt);e.jump=Math.max(0,e.jump-dt);
     e.nextBanana-=dt;
     if(!e.banana&&e.nextBanana<=0)e.banana={at:st.t+1.8,judged:false};
     if(e.banana&&st.t>e.banana.at+.3){if(!e.banana.judged){e.stumble=1.3;e.fx='';S.splat();}e.banana=null;e.nextBanana=rnd(5,9);}
     if(e.stumble<=0){e.dist+=st.SPEED*dt*(e.jump>0?1.1:1);}
     if(e.dist>=st.LEN&&e.done===null){e.done=st.t;S.fanfare();}
   });
   return st.ps.every(e=>e.done!==null)||st.t>=st.dur;
 },
 onBuzz(st,p,btn,down){
   if(!down)return;
   const e=st.ps.find(x=>x.p===p);if(!e||e.done!==null||e.stumble>0)return;
   if(st.wave&&!st.wave.judged.has(e)&&st.t>st.wave.at-.55&&st.t<st.wave.at+.3){
     st.wave.judged.add(e);
     if(btn===st.wave.color){e.jump=.6;e.fx=st.t>st.wave.at-.15?'PERFECT!':'';S.boing();}
     else{e.stumble=1.3;e.fx='';S.splat();}
     return;
   }
   if(e.banana&&!e.banana.judged&&st.t>e.banana.at-.55&&st.t<e.banana.at+.3){
     e.banana.judged=true;
     if(btn==='red'){e.jump=.6;S.boing();}else{e.stumble=1.3;S.splat();}
   }
 },
 ctrl(st,p){return {buttons:{red:true,blue:true,orange:true,green:true,yellow:true},prompt:'Match the hurdle colour — RED for banana skins!'};},
 tv(st){
   const T=st.t,laneH=64/st.ps.length;
   const hurdleSVG=c=>`<svg viewBox="0 0 40 62" style="display:block;width:100%;height:100%">
     <rect x="3" y="10" width="6" height="50" rx="3" fill="#7a4a21" stroke="#4a2a10" stroke-width="1.5"/>
     <rect x="31" y="10" width="6" height="50" rx="3" fill="#7a4a21" stroke="#4a2a10" stroke-width="1.5"/>
     <rect x="0" y="8" width="40" height="13" rx="6" fill="${c.hex}" stroke="${c.dark}" stroke-width="2.5"/>
     <rect x="2" y="30" width="36" height="9" rx="4" fill="${c.hex}" stroke="${c.dark}" stroke-width="2" opacity=".8"/>
   </svg>`;

   const tape=tapeBroken
     ?`<div class="tapeflap" style="position:absolute;left:87%;top:16%;height:26%;width:7px;z-index:2;background:linear-gradient(180deg,#ff5b5b,#e53935);border-radius:3px"></div>
       <div class="tapeflap" style="position:absolute;left:87.9%;top:16%;height:20%;width:7px;z-index:2;background:linear-gradient(180deg,#ff5b5b,#e53935);border-radius:3px;animation-delay:-.45s"></div>`
     :`<div style="position:absolute;left:87.4%;top:16%;bottom:16%;width:8px;z-index:3;background:repeating-linear-gradient(180deg,#ff5b5b 0 26px,#fff 26px 40px);border-radius:4px;box-shadow:0 0 6px rgba(0,0,0,.3)"></div>`;
   return `${timerHTML(st)}

   ${tape}
   <div style="position:absolute;left:87.4%;top:10%;font-size:clamp(18px,3vw,34px);z-index:2">🏁</div>
   ${st.ps.map((e,i)=>{
     const y=18+i*laneH;
     const c=COLORS.find(x=>x.id===e.p.color);
     const mx=8+(e.dist/st.LEN)*78;
     let obs='';

     }
     const jq=e.jump>0?(.6-e.jump)/.6:0;         // jump progress 0..1
     const jumpP=e.jump>0?Math.sin(jq*Math.PI):0;
     const pose=e.done!==null?'cheer':(e.stumble>0?'bonked':e.jump>0?'jump':'run');

     return `
     <div style="position:absolute;left:2%;right:2%;top:${(y+laneH*.14).toFixed(1)}%;height:${(laneH*.72).toFixed(1)}%;z-index:1;border-radius:14px;background:linear-gradient(180deg,#b3874c,#96703a);box-shadow:inset 0 4px 10px rgba(0,0,0,.22);border:2px solid rgba(74,42,16,.5)"></div>

     <div style="position:absolute;left:${mx.toFixed(1)}%;top:${py.toFixed(1)}%;width:7%;min-width:56px;z-index:6">${monkeyEase(e.p.id,e.p.color,pose,'',T+i*.37)}</div>

   }).join('')}`;

 end(st){
   return placeByScore(st.ps.map(e=>({p:e.p,score:e.done!==null?Math.round(1000-e.done*10):Math.round(e.dist)})));

 start(ctx){

 tv(st){

     const lastFew=e.stack.length>0&&e.stack.length<=3&&e.done===null;
     return `<div style="position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end">
       ${fly}
       <div style="display:flex;flex-direction:column-reverse;gap:2px;transform:rotate(${(Math.sin(T*2.2+i)*(1.6+(8-Math.min(8,e.stack.length))*.35)).toFixed(2)}deg)${e.chop>0?' translateY(5px)':''};transform-origin:50% 100%">
         ${e.stack.slice(0,8).map((h,hi)=>`<div style="width:clamp(34px,5.6vw,64px);height:clamp(18px,3vw,34px)${hi===0&&lastFew?`;filter:drop-shadow(0 0 ${(5+3*Math.sin(T*6)).toFixed(1)}px #ffe000)`:''}">${totemHeadSVG(h,hi+i)}</div>`).join('')}
         ${e.stack.length>8?`<div style="text-align:center;font-weight:800;opacity:.75;text-shadow:0 2px 3px rgba(0,0,0,.6)">+${e.stack.length-8}</div>`:''}
       </div>
       <div style="width:clamp(44px,6.6vw,76px);height:clamp(12px,1.8vw,22px);background:linear-gradient(180deg,#8a5426,#5d3617);border-radius:6px;border:3px solid #4a2a10;margin-top:3px"></div>
       <div style="width:clamp(46px,7vw,80px);margin-top:2px${e.chop>0?';transform:scaleX(-1)':''}">${monkeyEase(e.p.id,e.p.color,e.done!==null?'cheer':(e.lock>0?'bonked':e.chop>0?'throw':'idle'),'',T+i)}</div>
       <div style="font-weight:800;color:${c.hex};text-shadow:0 1px 2px rgba(0,0,0,.9),0 0 6px rgba(0,0,0,.5)">${esc(e.p.name)} ${e.done!==null?'🏁 +'+e.bonus:e.stack.length}</div>
     </div>`;}).join('')}
   </div>`;
 },
 end(st){
   return placeByScore(st.ps.map(e=>({p:e.p,score:(22-e.stack.length)*100+e.bonus})));
 },
};

function feedSafe(txt){if(isHost)feed(txt);}

/* ---------- init ---------- */
window.H=H; // console/e2e inspection
(function(){
  document.body.insertAdjacentHTML('afterbegin',SVGDEFS); // shared gradients for all sprite SVGs
  ui='home';render();
})();
</script>
